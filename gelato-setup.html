<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Setup Iniziale - Gusti Gelato</title>
<style>
  body { font-family: 'Palatino Linotype', serif; background: #150e0b; color: #f9f1e2; padding: 40px; text-align: center; }
  button { padding: 16px 32px; font-size: 18px; background: #d4af37; color: #150e0b; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 20px; }
  #result { margin-top: 20px; font-size: 15px; white-space: pre-line; }
  .warning { color: #ffcc66; font-size: 14px; margin-top: 16px; max-width: 500px; margin-left: auto; margin-right: auto; }
</style>
</head>
<body>
  <h1>🍦 Setup Iniziale Gusti Gelato</h1>
  <p>Questo script aggiunge i gusti iniziali al database. Usalo SOLO UNA VOLTA.</p>
  <button onclick="runSetup()">Esegui Setup</button>
  <div id="result"></div>
  <div class="warning">⚠️ Dopo aver eseguito questo setup con successo, puoi eliminare questo file (gelato-setup.html). Non è necessario per il funzionamento normale del menu.</div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC2b8xCtjv5M5xMSv8CYeOjP6ZocWXuwN4",
      authDomain: "lago-bin-menu.firebaseapp.com",
      databaseURL: "https://lago-bin-menu-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "lago-bin-menu",
      storageBucket: "lago-bin-menu.firebasestorage.app",
      messagingSenderId: "923333186211",
      appId: "1:923333186211:web:61335bce1af1283b2e6516"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const initialFlavors = {
      f01: { name: "Vaniglia", emoji: "🍦" },
      f02: { name: "Fiore di Latte", emoji: "🥛" },
      f03: { name: "Fragola", emoji: "🍓" },
      f04: { name: "Nocciola", emoji: "🌰" },
      f05: { name: "Limone", emoji: "🍋" },
      f06: { name: "Mango", emoji: "🥭" },
      f07: { name: "Cioccolata", emoji: "🍫" },
      f08: { name: "Caffè", emoji: "☕" },
      f09: { name: "Sorbetto", emoji: "🍧" },
      f10: { name: "Biscotto", emoji: "🍪" },
      f11: { name: "Maracuja", emoji: "🍊" },
      f12: { name: "Fiore di Latte al Pino", emoji: "🌲" },
      f13: { name: "Pistacchio", emoji: "🥜" },
      f14: { name: "Menta", emoji: "🌿" },
      f15: { name: "Stracciatella", emoji: "🍫" },
      f16: { name: "Gelato Misto", emoji: "🍨" },
      f17: { name: "Lavanda e Miele", emoji: "🍯" }
    };

    window.runSetup = function() {
      document.getElementById('result').textContent = 'Caricamento in corso...';
      set(ref(db, 'gelatoFlavors'), initialFlavors)
        .then(() => {
          document.getElementById('result').textContent = '✅ Setup completato! ' + Object.keys(initialFlavors).length + ' gusti aggiunti al database.';
        })
        .catch(err => {
          document.getElementById('result').textContent = '❌ Errore: ' + err.message;
        });
    };
  </script>
</body>
</html>
